# =====================================================
# Bipolar — Medication Tracker
# Nginx virtual host: bipolar.mandarinasoftware.uy
# =====================================================
# Nuevo dominio oficial. El legacy bipolar.tumvp.uy.conf
# se mantiene activo como fallback.
# =====================================================

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name bipolar.mandarinasoftware.uy;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS main vhost ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bipolar.mandarinasoftware.uy;

    ssl_certificate     /etc/letsencrypt/live/bipolar.mandarinasoftware.uy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bipolar.mandarinasoftware.uy/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 30M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self)" always;

    access_log /var/log/nginx/bipolar.mandarinasoftware.access.log;
    error_log  /var/log/nginx/bipolar.mandarinasoftware.error.log;

    # --- Twilio webhooks ---
    # Los endpoints son públicos (el backend valida X-Twilio-Signature).
    # Pasar Host sin modificar — Twilio firma la URL pública completa.
    location /api/twilio/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --- Main application ---
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        proxy_buffering off;
    }
}
