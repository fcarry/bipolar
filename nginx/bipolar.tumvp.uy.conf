# =====================================================
# Bipolar — Medication Tracker
# Nginx virtual host
# =====================================================
# Target file on the host:
#   /etc/nginx/sites-available/bipolar.tumvp.uy.conf
#
# Enable with:
#   sudo ln -s /etc/nginx/sites-available/bipolar.tumvp.uy.conf \
#              /etc/nginx/sites-enabled/
#
# Issue TLS cert (webroot):
#   sudo certbot certonly --webroot -w /var/www/html \
#        -d bipolar.tumvp.uy --non-interactive --agree-tos -m <email>
#
# Reload:
#   sudo nginx -t && sudo systemctl reload nginx
# =====================================================

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name bipolar.tumvp.uy;

    # Allow Let's Encrypt ACME challenge over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS main vhost ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name bipolar.tumvp.uy;

    # TLS certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/bipolar.tumvp.uy/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bipolar.tumvp.uy/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Body size — allows audio uploads (up to ~25 MB) + Twilio webhook payloads
    client_max_body_size 30M;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(self)" always;

    # Per-vhost logs (separate from other sites)
    access_log /var/log/nginx/bipolar.access.log;
    error_log  /var/log/nginx/bipolar.error.log;

    # --- Twilio webhooks ---
    # These endpoints are public (no JWT auth). The backend validates
    # the X-Twilio-Signature header. The `Host` header MUST be passed
    # unchanged — Twilio signs the full public URL, so mismatched Host
    # will cause signature validation to fail.
    location /api/twilio/ {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # --- Main application ---
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / HMR support (safe to leave on)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming responses (e.g. audio download)
        proxy_buffering off;
    }
}
